<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>🏇 競馬予想 完全版</title>
<style>
:root {
  --bg: #0f0f14;
  --bg2: #1a1a24;
  --bg3: #22222f;
  --border: #2e2e3e;
  --text: #e8e8f0;
  --text2: #9090a8;
  --gold: #f0c040;
  --red: #e05050;
  --blue: #5090e0;
  --green: #40b060;
  --orange: #e08030;
  --purple: #9060d0;
  --cyan: #30b0c0;
  --pink: #e060a0;
  --stamp-maru: #e05050;
  --stamp-shiro: #5090e0;
  --stamp-tri: #e08030;
  --stamp-hoshi: #9060d0;
  --stamp-chu: #30b0c0;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, 'Hiragino Sans', sans-serif;
  min-height: 100vh;
  padding-bottom: 80px;
}

/* ヘッダー */
.header {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 12px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
}
.header-title { font-size: 18px; font-weight: 700; color: var(--gold); }
.header-sub { font-size: 11px; color: var(--text2); letter-spacing: 0.1em; }
.btn-home {
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 6px 14px;
  border-radius: 8px;
  font-size: 13px;
  cursor: pointer;
}

/* ホーム画面 */
#home { padding: 16px; }
.setup-box {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
  margin-bottom: 20px;
}
.setup-title { font-size: 14px; color: var(--text2); margin-bottom: 10px; }
.setup-input {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 10px;
  border-radius: 8px;
  font-size: 13px;
  margin-bottom: 10px;
}
.btn-primary {
  width: 100%;
  background: var(--gold);
  color: #000;
  border: none;
  padding: 12px;
  border-radius: 8px;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
}
.btn-reload {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 12px;
  border-radius: 8px;
  font-size: 15px;
  cursor: pointer;
  margin-bottom: 12px;
}

/* 日付グループ */
.date-group { margin-bottom: 20px; }
.date-label {
  font-size: 12px;
  color: var(--text2);
  padding: 4px 0 8px;
  letter-spacing: 0.05em;
}
.race-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}
.race-btn {
  background: var(--bg2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 10px 6px;
  border-radius: 10px;
  font-size: 12px;
  cursor: pointer;
  text-align: center;
  line-height: 1.4;
}
.race-btn:active { opacity: 0.7; }
.race-btn .place { color: var(--text2); font-size: 10px; }
.race-btn .round { font-size: 15px; font-weight: 700; color: var(--gold); }

/* レース画面 */
#race { padding: 0; }
.race-info {
  background: var(--bg2);
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  font-size: 12px;
  color: var(--text2);
  text-align: center;
}
.race-info strong { color: var(--text); font-size: 14px; }

/* 再計算ボタン */
.recalc-btn {
  display: block;
  width: calc(100% - 32px);
  margin: 12px 16px;
  background: var(--gold);
  color: #000;
  border: none;
  padding: 14px;
  border-radius: 12px;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
}

/* 脚質分布 */
.style-box {
  background: var(--bg2);
  border: 1px solid var(--border);
  margin: 0 16px 12px;
  border-radius: 12px;
  padding: 12px 14px;
}
.style-title { font-size: 12px; color: var(--text2); margin-bottom: 6px; }
.style-row { display: flex; gap: 12px; flex-wrap: wrap; }
.style-item { font-size: 12px; }
.style-up { color: var(--green); }
.style-down { color: var(--red); }

/* 予想カード */
.pred-section { padding: 0 16px 12px; }
.pred-title { font-size: 13px; color: var(--text2); margin-bottom: 8px; }
.pred-cards {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  padding-bottom: 4px;
  -webkit-overflow-scrolling: touch;
}
.pred-card {
  flex: 0 0 100px;
  border-radius: 14px;
  padding: 12px 8px;
  text-align: center;
  border: 2px solid transparent;
  cursor: pointer;
}
.pred-card:active { opacity: 0.8; }
.pred-card .stamp-icon { font-size: 22px; margin-bottom: 4px; }
.pred-card .horse-num { font-size: 24px; font-weight: 800; }
.pred-card .horse-name { font-size: 10px; margin: 2px 0; opacity: 0.85; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.pred-card .score-val { font-size: 13px; font-weight: 700; }
.pred-card .jockey { font-size: 10px; opacity: 0.7; }

/* スコア印カード色 */
.card-maru  { background: #3a1515; border-color: var(--stamp-maru); }
.card-shiro { background: #152035; border-color: var(--stamp-shiro); }
.card-tri   { background: #3a2010; border-color: var(--stamp-orange,#e08030); }
.card-hoshi { background: #251535; border-color: var(--stamp-hoshi); }
.card-delta { background: #152530; border-color: var(--green); }
/* 期待値カード色 */
.card-chu1  { background: #102030; border-color: var(--cyan); }
.card-chu2  { background: #0e1e2c; border-color: #2090a8; }
.card-chu3  { background: #0c1c28; border-color: #186080; }
.card-chu4  { background: #0a1820; border-color: #104858; }
.card-chu5  { background: #081418; border-color: #0c3040; }
/* 重複（★）は赤系 */
.card-double { border-color: #ff4444 !important; box-shadow: 0 0 8px rgba(255,68,68,0.4); }

/* 全馬スコア一覧 */
.score-section { padding: 0 16px; }
.score-title { font-size: 13px; color: var(--text2); margin-bottom: 8px; }
.score-table { width: 100%; border-collapse: collapse; }
.score-table th {
  font-size: 10px;
  color: var(--text2);
  padding: 6px 4px;
  text-align: center;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
.score-table td {
  padding: 8px 4px;
  font-size: 12px;
  text-align: center;
  border-bottom: 1px solid var(--border);
}
.score-table tr:last-child td { border-bottom: none; }
.score-table .name-col { text-align: left; max-width: 90px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.score-high { color: var(--gold); font-weight: 700; }
.ev-high { color: var(--cyan); font-weight: 700; }

/* 印バッジ */
.stamp {
  display: inline-block;
  font-size: 14px;
  font-weight: 700;
  width: 24px;
  text-align: center;
}
.s-maru  { color: var(--stamp-maru); }
.s-shiro { color: var(--stamp-shiro); }
.s-tri   { color: var(--stamp-orange, #e08030); }
.s-hoshi { color: var(--stamp-hoshi); }
.s-chu   { color: var(--cyan); }
.s-delta { color: var(--green); }
.s-double{ background: rgba(255,68,68,0.15); border-radius: 4px; }

/* ローディング */
.loading {
  text-align: center;
  padding: 60px 16px;
  color: var(--text2);
  font-size: 14px;
}
.spinner {
  width: 32px; height: 32px;
  border: 3px solid var(--border);
  border-top-color: var(--gold);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* エラー */
.error-box {
  background: #3a1515;
  border: 1px solid var(--red);
  border-radius: 10px;
  padding: 14px;
  margin: 16px;
  font-size: 13px;
  color: var(--red);
}

/* セクション区切り */
.section-divider {
  height: 1px;
  background: var(--border);
  margin: 16px 16px;
}

/* GAS URL設定リンク */
.setting-link {
  display: block;
  text-align: center;
  color: var(--text2);
  font-size: 12px;
  padding: 8px;
  cursor: pointer;
  text-decoration: underline;
}
</style>
</head>
<body>

<!-- ヘッダー -->
<div class="header">
  <div>
    <div class="header-title">🏇 競馬予想 完全版</div>
    <div class="header-sub" id="header-sub">KANZENBAN ANALYZER</div>
  </div>
  <button class="btn-home" id="btn-home" onclick="showHome()" style="display:none">🏠 ホーム</button>
</div>

<!-- ホーム画面 -->
<div id="home">
  <div id="setup-area" style="display:none">
    <div class="setup-box">
      <div class="setup-title">⚙ GAS URL設定</div>
      <input type="url" class="setup-input" id="gas-url-input" placeholder="https://script.google.com/macros/s/.../exec">
      <button class="btn-primary" onclick="saveUrl()">保存して読み込む</button>
    </div>
  </div>
  <button class="btn-reload" onclick="loadRaceList()">🔄 レース一覧を更新</button>
  <div id="race-list">
    <div class="loading"><div class="spinner"></div>読み込み中...</div>
  </div>
  <span class="setting-link" onclick="showSetup()">⚙ GAS URL設定を変更</span>
</div>

<!-- レース画面 -->
<div id="race" style="display:none">
  <div class="race-info" id="race-info-bar"></div>

  <button class="recalc-btn" id="recalc-btn">🔄 再計算</button>

  <div class="style-box" id="style-box" style="display:none">
    <div class="style-title">📊 平均ペース</div>
    <div id="style-dist" class="style-row" style="margin-bottom:6px"></div>
    <div id="style-adv" style="font-size:12px">展開有利度：</div>
  </div>

  <!-- スコア印予想 -->
  <div class="pred-section">
    <div class="pred-title">予想（スコア上位 ◎○▲△☆）</div>
    <div class="pred-cards" id="score-cards"></div>
  </div>

  <!-- 期待値印 -->
  <div class="pred-section" id="ev-section" style="display:none">
    <div class="pred-title">注目馬（期待値上位 注1〜5）</div>
    <div class="pred-cards" id="ev-cards"></div>
  </div>

  <div class="section-divider"></div>

  <!-- 全馬スコア一覧 -->
  <div class="score-section">
    <div class="score-title">全馬スコア一覧</div>
    <table class="score-table">
      <thead>
        <tr>
          <th>順</th><th>印</th><th>馬番</th>
          <th class="name-col">馬名</th>
          <th>総合力</th><th>期待値</th><th>脚質</th>
        </tr>
      </thead>
      <tbody id="score-tbody"></tbody>
    </table>
  </div>
</div>

<script>
const STORAGE_KEY = 'keiba_kanzenban_gas_url';
let gasUrl = '';
let currentHorses = [];
let currentRaceInfo = {};

// ============================================================
// 初期化
// ============================================================
window.onload = function() {
  gasUrl = localStorage.getItem(STORAGE_KEY) || '';
  if (!gasUrl) {
    showSetup();
  } else {
    loadRaceList();
  }
};

function showSetup() {
  document.getElementById('setup-area').style.display = 'block';
  document.getElementById('gas-url-input').value = gasUrl;
}

function saveUrl() {
  const url = document.getElementById('gas-url-input').value.trim();
  if (!url) return;
  gasUrl = url;
  localStorage.setItem(STORAGE_KEY, url);
  document.getElementById('setup-area').style.display = 'none';
  loadRaceList();
}

// ============================================================
// ホーム：レース一覧
// ============================================================
async function loadRaceList() {
  document.getElementById('race-list').innerHTML = '<div class="loading"><div class="spinner"></div>読み込み中...</div>';
  try {
    const data = await callApi('list');
    renderRaceList(data.races || []);
  } catch(e) {
    document.getElementById('race-list').innerHTML =
      '<div class="error-box">❌ 取得失敗: ' + e.message + '<br>GAS URLを確認してください。</div>';
  }
}

function renderRaceList(races) {
  if (!races || races.length === 0) {
    document.getElementById('race-list').innerHTML =
      '<div class="error-box">レースデータがありません。<br>完全版で⑥指数計算を実行してください。</div>';
    return;
  }

  // 日付でグループ化
  const grouped = {};
  races.forEach(r => {
    const d = r.date || '';
    if (!grouped[d]) grouped[d] = [];
    grouped[d].push(r);
  });

  let html = '';
  Object.keys(grouped).sort().forEach(date => {
    html += `<div class="date-group"><div class="date-label">${formatDate(date)}</div><div class="race-grid">`;
    grouped[date].forEach(r => {
      const name = r.raceName || '';
      const nameShort = name.length > 5 ? name.substring(0,5)+'…' : name;
      html += `<button class="race-btn" onclick="loadRace('${r.raceId}')">
        <div class="place">${r.place||''}</div>
        <div class="round">${r.round||''}R</div>
        <div style="font-size:10px;color:var(--text2)">${nameShort}</div>
      </button>`;
    });
    html += '</div></div>';
  });

  document.getElementById('race-list').innerHTML = html;
}

// ============================================================
// レース画面
// ============================================================
async function loadRace(raceId) {
  showHome();
  document.getElementById('home').style.display = 'none';
  document.getElementById('race').style.display = 'block';
  document.getElementById('btn-home').style.display = 'block';
  document.getElementById('race-info-bar').innerHTML = '<div class="loading" style="padding:10px">読み込み中...</div>';
  document.getElementById('score-cards').innerHTML = '';
  document.getElementById('ev-cards').innerHTML = '';
  document.getElementById('score-tbody').innerHTML = '';

  document.getElementById('recalc-btn').onclick = () => loadRace(raceId);

  try {
    const data = await callApi('race', { raceId });
    currentHorses = data.horses || [];
    renderRace(currentHorses, raceId);
  } catch(e) {
    document.getElementById('race-info-bar').innerHTML = '<div class="error-box">❌ ' + e.message + '</div>';
  }
}

function renderRace(horses, raceId) {
  if (!horses || horses.length === 0) {
    document.getElementById('race-info-bar').innerHTML = '<div class="error-box">データなし</div>';
    return;
  }

  // レース情報バー
  const h0 = horses[0];
  const info = `<strong>${h0.date || ''}</strong> &nbsp; 出走 ${horses.length}頭`;
  document.getElementById('race-info-bar').innerHTML = info;
  document.getElementById('header-sub').textContent = 'RACE ' + raceId.slice(-4);

  // 脚質分布
  renderStyleDist(horses);

  // スコア印カード（◎○▲△☆ 上位5頭）
  // スプレッドシートは4頭のみ記録するが、アプリはスコア順に5頭表示
  const scoreSorted = [...horses].sort((a,b) => b.totalScore - a.totalScore);
  const scoreLabels = ['◎','○','▲','△','☆'];
  const scoreHorses = scoreSorted.slice(0, 5).map((h, i) => ({ horse: h, stamp: scoreLabels[i] }));
  renderScoreCards(scoreHorses);

  // 期待値印カード（注1〜5）
  // スプレッドシートは注1〜3のみ記録するが、
  // アプリ表示は期待値順に動的に上位5頭を選んで注1〜5を付ける
  const horsesWithEv = horses
    .filter(h => h.ev && h.ev !== '-' && parseFloat(h.ev) > 0)
    .sort((a, b) => parseFloat(b.ev) - parseFloat(a.ev));
  const evLabels = ['注1','注2','注3','注4','注5'];
  const evHorses = horsesWithEv.slice(0, 5).map((h, i) => ({ horse: h, stamp: evLabels[i] }));
  renderEvCards(evHorses);

  // 全馬一覧（スコア順）
  const sorted = [...horses].sort((a,b) => b.totalScore - a.totalScore);
  renderScoreTable(sorted);
}

function renderScoreCards(items) {
  const cardClasses = ['card-maru','card-shiro','card-tri','card-delta','card-hoshi'];
  const stampSymbols = { '◎':'◎','○':'○','▲':'▲','△':'△','☆':'☆' };
  let html = '';
  items.forEach((item, i) => {
    const h = item.horse;
    const cls = cardClasses[i] || 'card-shiro';
    const doubleCls = h.isDouble ? ' card-double' : '';
    const name = h.name.length > 5 ? h.name.substring(0,5)+'…' : h.name;
    const evStr = h.ev && h.ev !== '-' ? parseFloat(h.ev).toFixed(2) : '-';
    html += `<div class="pred-card ${cls}${doubleCls}">
      <div class="stamp-icon">${stampSymbols[item.stamp]||item.stamp}</div>
      <div class="horse-num">${h.umaban}</div>
      <div class="horse-name">${name}</div>
      <div class="score-val">${h.totalScore}</div>
      ${h.ev && h.ev !== '-' ? `<div style="font-size:10px;color:var(--cyan)">EV:${evStr}</div>` : ''}
    </div>`;
  });
  document.getElementById('score-cards').innerHTML = html || '<span style="color:var(--text2);font-size:12px">データなし</span>';
}

function renderEvCards(items) {
  const evSection = document.getElementById('ev-section');
  if (!items || items.length === 0) { evSection.style.display = 'none'; return; }
  evSection.style.display = 'block';

  const cardClasses = ['card-chu1','card-chu2','card-chu3','card-chu4','card-chu5'];
  let html = '';
  items.forEach((item, i) => {
    const h = item.horse;
    const cls = cardClasses[i] || 'card-chu1';
    const doubleCls = h.isDouble ? ' card-double' : '';
    const name = h.name.length > 5 ? h.name.substring(0,5)+'…' : h.name;
    const evStr = h.ev && h.ev !== '-' ? parseFloat(h.ev).toFixed(2) : '-';
    const oddsStr = h.odds && h.odds !== '-' ? parseFloat(h.odds).toFixed(1)+'倍' : '-';
    html += `<div class="pred-card ${cls}${doubleCls}">
      <div class="stamp-icon" style="color:var(--cyan)">${item.stamp}</div>
      <div class="horse-num">${h.umaban}</div>
      <div class="horse-name">${name}</div>
      <div class="score-val" style="color:var(--cyan)">EV:${evStr}</div>
      <div style="font-size:10px;color:var(--text2)">${oddsStr}</div>
    </div>`;
  });
  document.getElementById('ev-cards').innerHTML = html;
}

function renderScoreTable(sorted) {
  const stampClass = { '◎':'s-maru','○':'s-shiro','▲':'s-tri','△':'s-delta','☆':'s-hoshi' };
  let html = '';
  sorted.forEach((h, i) => {
    const ss = h.scoreStamp || '';
    const es = h.evStamp || '';
    const doubleCls = h.isDouble ? ' s-double' : '';
    const sClass = stampClass[ss] || (es ? 's-chu' : '');
    const displayStamp = ss || es;
    const evStr = h.ev && h.ev !== '-' ? parseFloat(h.ev).toFixed(2) : '-';
    const evCls = parseFloat(h.ev) >= 1.0 ? 'ev-high' : '';
    const scoreCls = i === 0 ? 'score-high' : '';
    const style = h.evStamp ? 'color:var(--cyan)' : '';

    // 脚質バッジ色
    const styleColor = { '逃げ':'var(--red)','先行':'var(--orange)','差し':'var(--blue)','追込':'var(--purple)' };
    const styleBg = styleColor[h.scoreV] || 'var(--text2)'; // scoreVは脚質スコアなので別途

    html += `<tr>
      <td>${i+1}</td>
      <td><span class="stamp ${sClass}${doubleCls}" style="${style}">${displayStamp}</span></td>
      <td>${h.umaban}</td>
      <td class="name-col">${h.name}</td>
      <td class="${scoreCls}">${h.totalScore}</td>
      <td class="${evCls}">${evStr}</td>
      <td style="font-size:10px">${getStyleLabel(h)}</td>
    </tr>`;
  });
  document.getElementById('score-tbody').innerHTML = html;
}

function renderStyleDist(horses) {
  const styles = { '逃げ': 0, '先行': 0, '差し': 0, '追込': 0 };
  horses.forEach(h => {
    // 脚質は馬データから取得できないため期待値印で代替表示省略
  });
  // 脚質データがあれば表示（現状は非表示）
  document.getElementById('style-box').style.display = 'none';
}

function getStyleLabel(h) {
  // 脚質は指数計算シートに含まれていないため空表示
  return '';
}

// ============================================================
// 画面切り替え
// ============================================================
function showHome() {
  document.getElementById('home').style.display = 'block';
  document.getElementById('race').style.display = 'none';
  document.getElementById('btn-home').style.display = 'none';
  document.getElementById('header-sub').textContent = 'KANZENBAN ANALYZER';
}

// ============================================================
// API呼び出し
// ============================================================
function callApi(action, params = {}) {
  if (!gasUrl) throw new Error('GAS URLが設定されていません');
  const url = new URL(gasUrl);
  url.searchParams.set('action', action);
  Object.keys(params).forEach(k => url.searchParams.set(k, params[k]));
  return fetch(url.toString())
    .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); });
}

// ============================================================
// ユーティリティ
// ============================================================
function formatDate(d) {
  if (!d) return '';
  // "Sat Jun 20..." → "2026/06/20（土）"
  const match = String(d).match(/(\d{4})\/(\d{2})\/(\d{2})/);
  if (match) {
    const days = ['日','月','火','水','木','金','土'];
    const dt = new Date(match[1], parseInt(match[2])-1, match[3]);
    return `${match[1]}/${match[2]}/${match[3]}（${days[dt.getDay()]}）`;
  }
  return String(d);
}
